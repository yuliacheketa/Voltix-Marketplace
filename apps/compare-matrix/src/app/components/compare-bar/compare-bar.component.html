<div class="co-bar">
  <div class="co-bar-inner">
    <div class="co-bar-thumbs">
      @for (p of products(); track p.id) {
        <div class="co-bar-item">
          @if (p.imageUrl) {
            <img
              class="co-bar-img"
              [src]="p.imageUrl"
              [alt]="p.title"
              loading="lazy"
            />
          } @else {
            <div class="co-bar-placeholder">{{ p.title.slice(0, 1) }}</div>
          }
          <button
            type="button"
            class="co-bar-remove"
            (click)="remove(p.id, $event)"
            aria-label="Remove from compare"
          >
            ×
          </button>
        </div>
      }
    </div>
    <button type="button" class="co-bar-cta" (click)="compareNow()">
      Compare now
    </button>
  </div>
</div>
