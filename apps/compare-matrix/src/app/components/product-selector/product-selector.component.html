<div class="co-selector">
  <label class="co-selector-label" for="co-search"
    >Add product to compare</label
  >
  <div class="co-selector-row">
    <input
      id="co-search"
      class="co-selector-input"
      type="search"
      name="coSearch"
      [(ngModel)]="query"
      (ngModelChange)="onQueryChange($event)"
      [disabled]="atMax()"
      placeholder="Search products…"
      autocomplete="off"
    />
    @if (loading()) {
      <span class="co-selector-loading">Searching…</span>
    }
  </div>
  @if (atMax()) {
    <p class="co-selector-max">Maximum {{ max }} products in compare.</p>
  }
  @if (results().length && !atMax()) {
    <ul class="co-selector-list">
      @for (p of results(); track p.id) {
        <li class="co-selector-li">
          <button type="button" class="co-selector-pick" (click)="pick(p)">
            {{ p.title }}
          </button>
        </li>
      }
    </ul>
  }
</div>
