<div class="co-radar">
  <h2 class="co-radar-title">Spec profile (normalized 0–100)</h2>
  @if (products().length < 2) {
    <p class="co-radar-hint">Add at least two products with numeric specs.</p>
  } @else if (chartResults().length === 0) {
    <p class="co-radar-hint">Not enough overlapping numeric attributes.</p>
  } @else {
    <div class="co-radar-chart">
      <ngx-charts-polar-chart
        [results]="chartResults()"
        [scheme]="scheme"
        [legend]="true"
        [gradient]="false"
        [xAxis]="true"
        [yAxis]="true"
        [showXAxisLabel]="false"
        [showYAxisLabel]="true"
        [yAxisLabel]="'Score'"
        [animations]="true"
        [view]="view()"
      />
    </div>
  }
</div>
