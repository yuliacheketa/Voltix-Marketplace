@if (products().length === 0) {
  <p class="co-table-empty">No products to compare yet.</p>
} @else {
  <div class="co-table-wrap">
    <table class="co-table">
      <thead>
        <tr>
          <th class="co-table-spec" scope="col">Spec</th>
          @for (p of products(); track p.id) {
            <th class="co-table-head" scope="col">{{ p.title }}</th>
          }
        </tr>
      </thead>
      <tbody>
        @for (row of tableRows(); track row.rowKey) {
          <tr>
            <th class="co-table-rowhead" scope="row">{{ row.rowKey }}</th>
            @for (cell of row.cells; track cell.productId) {
              <td
                class="co-table-cell"
                [class.co-table-cell-best]="cell.tier === 'best'"
                [class.co-table-cell-worst]="cell.tier === 'worst'"
              >
                {{ cell.display }}
              </td>
            }
          </tr>
        }
      </tbody>
    </table>
  </div>
}
